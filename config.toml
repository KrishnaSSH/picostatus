# default timeout for all checks 
timeout = "10s"

# how many result rows to keep per check 
retain_results = 1000

[[checks]]
name     = "gh status"
url      = "https://githubstatus.com"
interval = "30s"
timeout  = "5s"
retain_results = 500

[[checks]]
name           = "gh"
url            = "https://github.com"
interval       = "60s"
timeout        = "5s"   # override: how much timeout for this check
retain_results = 500    # override: how much results for this check
